<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mama's Birthday Surprise</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- SPLASH SCREEN -->

    <div id="splash-screen">

        <div class="photo-slider">
            <img src="new/pics/IMG_20260511_061330_777.jpg">
            <img src="new/pics/IMG_20260511_061330_778.jpg">
            <img src="new/pics/IMG_20260512_224223_836.jpg">
            <img src="new/pics/IMG_20260512_224239_858.jpg">
            <img src="new/pics/IMG_20260511_061330_779.jpg">
            <img src="new/pics/IMG_20260512_224219_637.jpg">
        </div>

        <div class="splash-content">
            <h1>For My Special Someone Mama</h1>

            <button class="open-btn" onclick="openMain()">
                Open Surprise
            </button>
        </div>

    </div>

    <!-- MAIN CONTENT -->

    <div id="main-content">

        <div class="container">

            <!-- SCREEN 1 -->

            <div id="screen1" class="screen active">

                <h3>Enter a passcode</h3>

                <p id="pass-display">_ _ _ _</p>

                <div class="passcode-grid">

                    <button onclick="addNum(1)">1</button>
                    <button onclick="addNum(2)">2</button>
                    <button onclick="addNum(3)">3</button>
                    <button onclick="addNum(4)">4</button>
                    <button onclick="addNum(5)">5</button>
                    <button onclick="addNum(6)">6</button>
                    <button onclick="addNum(7)">7</button>
                    <button onclick="addNum(8)">8</button>
                    <button onclick="addNum(9)">9</button>

                </div>

            </div>

            <!-- SCREEN 2 -->

            <div id="screen2" class="screen">

                <h2>HAPPY BIRTHDAY!</h2>

                <img src="new/pics/IMG_20260512_224219_637.jpg" class="photo-frame">

                <p>I made this just for you.</p>

                <button class="btn-action" onclick="nextScreen(3)">
                    NEXT
                </button>

            </div>

            <!-- SCREEN 3 -->

            <div id="screen3" class="screen">

                <h2>Are you ready for a surprise?</h2>

                <div class="choice-buttons">

                    <button class="btn-action" onclick="nextScreen(4)">
                        YES
                    </button>

                    <button class="btn-action" onclick="handleNo()">
                        NO
                    </button>

                </div>

            </div>

            <!-- SCREEN 4 -->

            <div id="screen4" class="screen">

                <h2>Pick a gift!</h2>

                <div class="gift-container">

                    <div class="gift" onclick="alert('Reward:A Scheduled Trio outing 🎉')">
                        🎁
                    </div>

                    <div class="gift" onclick="alert('Reward: This is a surprise, so it is yet to be revealed')">
                        🎁
                    </div>

                    <div class="gift" onclick="alert('Reward: A Photo album Yet to be created 📸')">
                        🎁
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
